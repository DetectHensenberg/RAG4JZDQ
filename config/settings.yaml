# 九洲 RAG 管理平台 - Configuration
# This is the main configuration file for the MCP Server.
# Edit this file to configure LLM, Embedding, VectorStore, and other services.

# =============================================================================
# LLM Configuration
# =============================================================================
llm:
  provider: "openai"  # Using DashScope OpenAI-compatible API for Qwen
  model: "qwen3.5-plus"
  base_url: "https://coding.dashscope.aliyuncs.com/v1"
  api_key: ""  # 从环境变量 DASHSCOPE_API_KEY 自动读取
  temperature: 0.0
  max_tokens: 4096
  proxy: ""  # 本地代理，留空则不使用代理

# =============================================================================
# Embedding Configuration
# =============================================================================
embedding:
  provider: "openai"  # Using DashScope OpenAI-compatible API for Qwen embedding
  model: "text-embedding-v3"
  dimensions: 1024  # DashScope text-embedding-v3 默认 1024 维
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  api_key: ""  # 从环境变量 DASHSCOPE_API_KEY 自动读取

# =============================================================================
# Vision LLM Configuration (for Image Captioning)
# =============================================================================
vision_llm:
  enabled: true  # Enable vision capabilities for scanned PDF/PPTX processing
  provider: "openai"  # Using DashScope OpenAI-compatible API for Qwen VL
  model: "qwen3.5-plus"  # qwen3.5-plus 原生支持视觉理解
  base_url: "https://coding.dashscope.aliyuncs.com/v1"
  api_key: ""  # 从环境变量 DASHSCOPE_API_KEY 自动读取
  max_image_size: 2048  # Max dimension (width/height) for image compression
  proxy: ""  # 本地代理，留空则不使用代理

# =============================================================================
# Vector Store Configuration
# =============================================================================
vector_store:
  provider: "chroma"  # Options: chroma, qdrant, pinecone
  persist_directory: "./data/db/chroma"
  collection_name: "default"

# =============================================================================
# Retrieval Configuration
# =============================================================================
retrieval:
  dense_top_k: 20
  sparse_top_k: 20
  fusion_top_k: 10
  rrf_k: 60  # RRF constant
  query_rewrite: false  # LLM query rewriting (requires LLM calls)
  hyde_enabled: false   # HyDE - Hypothetical Document Embedding (requires LLM calls)
  parent_retrieval_mode: "auto"  # auto | always | never
  graph_rag_mode: "auto"         # auto | always | never
  enable_suggested_questions: true

# =============================================================================
# Rerank Configuration
# =============================================================================
rerank:
  enabled: true
  provider: "cross_encoder"  # Options: none, cross_encoder, llm
  model: "BAAI/bge-reranker-base"  # Fast on CPU, excellent Chinese support
  top_k: 5

# =============================================================================
# Evaluation Configuration
# =============================================================================
evaluation:
  enabled: false
  provider: "custom"  # Options: ragas, deepeval, custom
  metrics:
    - "hit_rate"
    - "mrr"
    - "faithfulness"

# =============================================================================
# Observability Configuration
# =============================================================================
observability:
  log_level: "INFO"  # Options: DEBUG, INFO, WARNING, ERROR
  trace_enabled: true
  trace_file: "./logs/traces.jsonl"
  structured_logging: true

# =============================================================================
# Ingestion Configuration
# =============================================================================
ingestion:
  chunk_size: 1500      # 增大以携带更完整语义 (LLM 131K 窗口足够)
  chunk_overlap: 300    # 20% 重叠率
  splitter: "structure"  # Options: recursive, structure
  batch_size: 100
  pdf_parser: "layout"  # Options: markitdown, layout, docling (docling = IBM 深度学习版面理解, 需 pip install .[docling])
  
  # Chunk Refiner Configuration (C5)
  chunk_refiner:
    use_llm: false  # Set to true to enable LLM-based refinement (requires LLM config)
    # When use_llm is false or LLM call fails, falls back to rule-based refinement
  
  # Metadata Enricher Configuration (C6)
  metadata_enricher:
    use_llm: false  # Set to true to enable LLM-based enrichment (requires LLM config)
    # When use_llm is false or LLM call fails, falls back to rule-based enrichment
  
  # Context Enricher Configuration (Contextual Retrieval)
  # Injects document filename prefix into embedding text for better retrieval
  context_enricher:
    enabled: true  # Set to false to disable context injection

# =============================================================================
# BGE-M3 Embedding Configuration (Optional)
# =============================================================================
# To use BGE-M3 instead of OpenAI/DashScope embedding:
# 1. Install: pip install FlagEmbedding>=1.2.0
# 2. Change embedding.provider to "bge-m3"
# 3. Configure bge_m3 section below
#
# embedding:
#   provider: "bge-m3"
#   model: "BAAI/bge-m3"  # Required but ignored for BGE-M3
#   dimensions: 1024      # BGE-M3 fixed dimension
#   bge_m3:
#     model: "BAAI/bge-m3"  # HuggingFace model name
#     use_fp16: true        # Use FP16 for faster inference
#     device: "auto"        # auto/cpu/cuda
